<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sri Raghavendra Grocery</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo">

<img src="images/logo.png">

</div>

<div class="search">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
placeholder="Search Products...">

</div>

<div class="profile">

<i class="fa-solid fa-user"></i>

</div>

</header>

<section class="slider">

<img id="banner"
src="images/banner1.jpg">

</section>

<h2>Shop By Category</h2>

<div class="categories">

<div class="category">

<img src="images/rice.jpg">

<p>Rice</p>

</div>

<div class="category">

<img src="images/pulses.jpg">

<p>Pulses</p>

</div>

<div class="category">

<img src="images/sugar.jpg">

<p>Sugar</p>

</div>

<div class="category">

<img src="images/oil.jpg">

<p>Edible Oils</p>

</div>

<div class="category">

<img src="images/flour.jpg">

<p>Flours</p>

</div>

<div class="category">

<img src="images/spices.jpg">

<p>Spices</p>

</div>

<div class="category">

<img src="images/housekeeping.jpg">

<p>Cleaning</p>

</div>

<div class="category">

<img src="images/snacks.jpg">

<p>Snacks</p>

</div>

</div>

<nav>

<div>

<i class="fa-solid fa-house"></i>

<p>Home</p>

</div>

<div>

<i class="fa-solid fa-repeat"></i>

<p>Reorder</p>

</div>

<div>

<i class="fa-solid fa-user"></i>

<p>Account</p>

</div>

<div>

<i class="fa-solid fa-cart-shopping"></i>

<p>Cart</p>

</div>

</nav>

<script src="js/slider.js"></script>

</body>
</html>
